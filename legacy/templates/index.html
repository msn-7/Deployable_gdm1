<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gestational Diabetes Detection</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
        }

        .glass-card {
            width: 420px;
            padding: 30px 35px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.25);
        }

        h1 {
            text-align: center;
            font-size: 22px;
            margin-bottom: 5px;
            color: #e0f7ff;
        }

        h2 {
            text-align: center;
            font-size: 14px;
            font-weight: normal;
            margin-bottom: 25px;
            color: #b8e7ff;
        }

        label {
            font-size: 13px;
            color: #e6f9ff;
            margin-bottom: 4px;
            display: block;
        }

        input {
            width: 100%;
            padding: 9px;
            margin-bottom: 14px;
            border-radius: 8px;
            border: none;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            font-size: 14px;
        }

        input::placeholder {
            color: #ccefff;
        }

        input:focus {
            outline: none;
            box-shadow: 0 0 8px #00f2ff;
            background: rgba(255, 255, 255, 0.2);
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #00f2ff, #4facfe);
            color: #003344;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #00f2ff;
        }

        .result {
            margin-top: 20px;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
        }

        .precaution {
            margin-top: 8px;
            text-align: center;
            font-size: 14px;
            color: #d7f7ff;
        }

        .footer-note {
            margin-top: 15px;
            text-align: center;
            font-size: 11px;
            color: #b0dfff;
            opacity: 0.8;
        }
    </style>

</head>
<body>

    <form class="glass-card" method="POST">

        <h1>Gestational Diabetes Detection</h1>
        <h2>AI-Powered Smart Assistant for Doctors</h2>

        <label>Pregnancies</label>
        <input type="number" name="pregnancies" min="0" required>

        <label>Glucose Level</label>
        <input type="number" name="glucose" required>

        <label>Blood Pressure</label>
        <input type="number" name="bloodpressure" required>

        <label>Skin Thickness</label>
        <input type="number" name="skinthickness" required>

        <label>Insulin</label>
        <input type="number" name="insulin" required>

        <label>BMI</label>
        <input type="number" step="0.1" name="bmi" required>

        <label>Diabetes Pedigree Function</label>
        <input type="number" step="0.01" name="dpf" required>

        <label>Age</label>
        <input type="number" name="age" required>

        <button type="submit">Analyze Risk</button>

        <div class="result">{{ result }}</div>
        <div class="precaution">{{ precaution }}</div>

        <div class="footer-note">
            Decision-support tool • Not a medical diagnosis
        </div>

    </form>

</body>
</html>
